name: Schedule Smoke Test

on:
  schedule:
    # Temporary one-time smoke test: 2026-06-04 06:05 UTC = 2026-06-04 14:05 Asia/Shanghai.
    - cron: "5 6 4 6 *"
  workflow_dispatch:

jobs:
  send-smoke-email:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Send smoke test email
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          MAIL_FROM: ${{ secrets.MAIL_FROM }}
          MAIL_TO: ${{ secrets.MAIL_TO }}
        run: |
          python - <<'PY'
          from __future__ import annotations

          import os
          import smtplib
          import ssl
          from datetime import datetime, timedelta, timezone
          from email.message import EmailMessage

          required = ["SMTP_HOST", "SMTP_USERNAME", "SMTP_PASSWORD", "MAIL_FROM", "MAIL_TO"]
          missing = [name for name in required if not os.getenv(name)]
          if missing:
              raise RuntimeError(f"Missing required environment variables: {', '.join(missing)}")

          host = os.environ["SMTP_HOST"]
          port = int(os.getenv("SMTP_PORT", "587"))
          username = os.environ["SMTP_USERNAME"]
          password = os.environ["SMTP_PASSWORD"]
          mail_from = os.environ["MAIL_FROM"]
          recipients = [addr.strip() for addr in os.environ["MAIL_TO"].split(",") if addr.strip()]
          now = datetime.now(timezone(timedelta(hours=8)))

          message = EmailMessage()
          message["Subject"] = f"Schedule Smoke Test - {now:%Y-%m-%d %H:%M} Asia/Shanghai"
          message["From"] = mail_from
          message["To"] = ", ".join(recipients)
          message.set_content(
              "\n".join(
                  [
                      "This is a temporary GitHub Actions schedule smoke test.",
                      f"Event: {os.getenv('GITHUB_EVENT_NAME', 'unknown')}",
                      f"Run ID: {os.getenv('GITHUB_RUN_ID', 'unknown')}",
                      f"Generated: {now:%Y-%m-%d %H:%M:%S} Asia/Shanghai",
                  ]
              )
          )

          context = ssl.create_default_context()
          if port == 465:
              with smtplib.SMTP_SSL(host, port, context=context, timeout=30) as server:
                  server.login(username, password)
                  server.send_message(message)
          else:
              with smtplib.SMTP(host, port, timeout=30) as server:
                  server.starttls(context=context)
                  server.login(username, password)
                  server.send_message(message)

          print(f"Smoke test email sent to {len(recipients)} recipient(s).")
          PY
